name: 🎨 Monitor Cenacolo Vinciano — 18/09/2026

on:
  schedule:
    # A cada 10 minutos o dia todo
    - cron: '*/10 * * * *'
    # A cada 1 minuto entre 09h50–09h59 UTC (= 11h50–11h59 horário Itália)
    - cron: '50-59 9 * * *'
    # A cada 1 minuto entre 10h00–10h15 UTC (= 12h00–12h15 horário Itália)
    - cron: '0-15 10 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Enviar email de teste?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-tickets:
    name: Verificar disponibilidade de ingressos
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Verificar ingressos
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_MODE:          ${{ inputs.test_mode || 'false' }}
        run: python monitor.py

      - name: 📸 Screenshots de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_number }}
          path: debug_*.png
          retention-days: 2
          if-no-files-found: ignore
